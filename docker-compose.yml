# Nota: elimina la clave "version", ya no se usa en Compose v2
services:
  traefik:
    image: traefik:v2.11
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=victorhug1@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/certs:/letsencrypt
    labels:
      - "traefik.enable=true"
      # Redirección HTTP -> HTTPS para dominios del stack (opcional pero recomendado)
      - "traefik.http.routers.redirect-web.rule=Host(`pantom.net`) || Host(`www.pantom.net`) || Host(`n8n.pantom.net`)"
      - "traefik.http.routers.redirect-web.entrypoints=web"
      - "traefik.http.routers.redirect-web.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    restart: always
    networks:
      - proxy

  pantom:
    image: node:18-alpine
    working_dir: /app
    environment:
      - NODE_ENV=production
      - PORT=3000
    command: sh -lc "npm ci --omit=dev && npm run build && npm run start"
    volumes:
      - .:/app
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Router para pantom.net y www
      - "traefik.http.routers.pantom.rule=Host(`pantom.net`) || Host(`www.pantom.net`)"
      - "traefik.http.routers.pantom.entrypoints=websecure"
      - "traefik.http.routers.pantom.tls.certresolver=letsencrypt"
      # Servicio/puerto interno de Next.js
      - "traefik.http.services.pantom.loadbalancer.server.port=3000"
    restart: always
    networks:
      - proxy

  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: always
    environment:
      - NODE_ENV=production
      - TZ=America/Bogota

      # URL públicas
      - N8N_HOST=n8n.pantom.net
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.pantom.net
      - N8N_WEBHOOK_URL=https://n8n.pantom.net
      - N8N_EDITOR_BASE_URL=https://n8n.pantom.net

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.n8n.rule=Host(`n8n.pantom.net`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    volumes:
      - ./n8n:/home/node/.n8n
    networks:
      - proxy

networks:
  proxy:
    external: true
